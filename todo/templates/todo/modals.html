<!-- Add -->
<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form id="taskForm"
                  method="POST"
                  action="{% url 'todo:task_create' %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">
                        Add Task
                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input
                            type="text"
                            name="title"
                            class="form-control title-input">

                        <div class="invalid-feedback title-error"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>

                        <textarea
                            name="description"
                            class="form-control"
                            rows="3">{{ task.description }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">Priority</label>
                            {{ form.priority }}
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            {{ form.category }}
                        </div>

                        <div class="col-md-4">

                            <label class="form-label">Due Date</label>

                            <input
                                type="date"
                                name="due_date"
                                class="form-control due-date-input">

                            <div class="invalid-feedback due-date-error"></div>

                        </div>
                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button
                        type="submit"
                        class="btn btn-accent"
                        id="taskSubmitBtn">
                        Save Task
                    </button>

                </div>

            </form>

        </div>
    </div>
</div> 

<!-- Edit Task Modals -->
{% for task in tasks %}

<div class="modal fade" id="editTaskModal{{ task.pk }}" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form method="POST"
                id="editTaskForm{{ task.pk }}"
                class="edit-task-form"
                action="{% url 'todo:task_update' task.pk %}">

                {% csrf_token %}

                <div class="modal-header">
                    <h5 class="modal-title">
                        Edit Task
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Title</label>

                        <input
                            type="text"
                            name="title"
                            class="form-control title-input"
                            value="{{ task.title }}">

                        <div class="invalid-feedback title-error"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>

                        <textarea
                            name="description"
                            class="form-control"
                            rows="3">{{ task.description }}</textarea>
                    </div>

                    <div class="row">

                        <div class="col-md-4">

                            <label class="form-label">Priority</label>

                            <select name="priority" class="form-select">

                                <option value="high"
                                {% if task.priority == "high" %}selected{% endif %}>
                                    High
                                </option>

                                <option value="medium"
                                {% if task.priority == "medium" %}selected{% endif %}>
                                    Medium
                                </option>

                                <option value="low"
                                {% if task.priority == "low" %}selected{% endif %}>
                                    Low
                                </option>

                            </select>

                        </div>

                        <div class="col-md-4">

                            <label class="form-label">Category</label>

                            <select name="category" class="form-select">

                                {% for value,label in form.category.field.choices %}
                                    <option value="{{ value }}"
                                    {% if task.category == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                {% endfor %}

                            </select>

                        </div>

                        <div class="col-md-4">

                            <label class="form-label">Due Date</label>

                            <input
                                type="date"
                                name="due_date"
                                class="form-control due-date-input"
                                value="{{ task.due_date|date:'Y-m-d' }}">
                            
                            <div class="invalid-feedback due-date-error"></div>
                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button
                        type="submit"
                        class="btn btn-warning">
                        Update Task
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>

{% endfor %}

<!-- Delete Task Modals -->

{% for task in tasks %}

<div class="modal fade"
     id="deleteTaskModal{{ task.pk }}"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <form
                method="POST"
                class="delete-task-form"
                action="{% url 'todo:task_delete' task.pk %}">

                {% csrf_token %}

                <div class="modal-header">

                    <h5 class="modal-title text-danger">
                        Delete Task
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div class="text-center">

                        <i class="bi bi-exclamation-triangle-fill
                                  text-danger"
                           style="font-size:3rem;"></i>

                        <h5 class="mt-3">
                            Are you sure?
                        </h5>

                        <p class="text-muted mb-0">
                            You are about to delete
                        </p>

                        <strong>
                            "{{ task.title }}"
                        </strong>

                        <p class="text-muted mt-2">
                            This action cannot be undone.
                        </p>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                        type="submit"
                        class="btn btn-danger">

                        Delete Task

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endfor %}
