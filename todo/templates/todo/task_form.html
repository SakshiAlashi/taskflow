{% extends "todo/base.html"%}
{% block content %}
    <h2>{% if task %} Edit {% else %}Add {%endif%} Task</h2>
    {% if error %}
        <div class = "alert alert-danger"> {{error}} </div>
    {% endif %}
    <form method="POST">
        {%csrf_token%}
        <div class="mb-3">
            <label class="form-label"> Title </label>
            <input type="Text" name="title" class="form-control" value="{{task.title}}">
        </div>
        <div class="mb-3">
            <label class="form-label"> Description </label>
            <textarea name="description" class="form-control" rows="3">{{ task.description}}
            </textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select">
                <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                <option value="medium" {% if task.priority == 'medium' or not task %}selected{% endif %}>Medium</option>
                <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
            </select>
        </div>
         <div class="mb-3">
            <label class="form-label">Due date</label>
            <input type="date" name="due_date" class="form-control" value="{{ task.due_date|date:'Y-m-d' }}">
        </div>
         {% if task %}
        <div class="mb-3 form-check">
            <input type="checkbox" name="completed" class="form-check-input" id="completedCheck" {% if task.completed %}checked{% endif %}>
            <label class="form-check-label" for="completedCheck">Completed</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url "todo:task_list" %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
