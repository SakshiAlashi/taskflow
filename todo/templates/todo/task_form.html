{% extends "todo/base.html" %}
{% block content %}
    <h2>{% if task %}Edit{% else %}Add{% endif %} Task</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-accent">Save</button>
        <a href="{% url 'todo:task_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
